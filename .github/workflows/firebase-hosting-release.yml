name: Deploy to Firebase Hosting on release
# Modification: We only want to update the live website when there is a release.
on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.1
        with:
          version: 'latest'
      - name: Build with Trunk
        run: cd fpga_arch_viewer && trunk build --release --public-url "https://fpga-architecture-visualizer.web.app/"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FPGA_ARCHITECTURE_VISUALIZER }}
          channelId: live
          projectId: fpga-architecture-visualizer

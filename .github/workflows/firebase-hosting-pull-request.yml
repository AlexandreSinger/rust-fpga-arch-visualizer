name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.1
        with:
          version: 'latest'
      # NOTE: This does not use a public URL since these will use temporary URLs for testing.
      - name: Build with Trunk
        run: cd fpga_arch_viewer && trunk build --release
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FPGA_ARCHITECTURE_VISUALIZER }}
          projectId: fpga-architecture-visualizer
